# Versioned Exception Registry for FrontierMind Evaluations.
# Exceptions are known deviations that should not fail tests.
# Each exception has an optional expiry date for periodic review.

schema_version: "1.0"

exceptions:
  - id: EXC-001
    description: "ABI01, BNT01, ZO01 have no SAGE contracts"
    scope: "contract mapping"
    sage_ids: [ABI01, BNT01, ZO01]
    expiry: null  # Permanent -- these are PDF-only projects
    added: "2026-02-28"

  - id: EXC-002
    description: "5 currency mismatches (SAGE=USD, FM=local) are domain differences, not errors"
    scope: "currency validation"
    details:
      - {sage_id: XF-AB, sage_currency: USD, fm_currency: KES}
      - {sage_id: QMM01, sage_currency: USD, fm_currency: MGA}
      - {sage_id: ERG, sage_currency: USD, fm_currency: MGA}
      - {sage_id: MIR01, sage_currency: USD, fm_currency: SLE}
      - {sage_id: TWG01, sage_currency: USD, fm_currency: MZN}
    expiry: "2026-06-01"  # Revisit after CBE clarifies invoice currency
    added: "2026-02-28"

  - id: EXC-003
    description: "migration 047 excludes OM contracts -- intentional scope limitation"
    scope: "contract coverage"
    expiry: "migration 048"
    added: "2026-02-28"

  - id: EXC-004
    description: "cbe_billing_adapter N/A classification includes non-energy products"
    scope: "ingestion accuracy"
    details: "cbe_billing_adapter.py:47 AVAILABLE_CATEGORIES = {'available', 'n/a', 'N/A'} treats all N/A as available energy"
    expiry: "code fix required before 048"
    added: "2026-02-28"
